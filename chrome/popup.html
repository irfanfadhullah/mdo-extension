<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capture as MDO</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #121212;
      --panel: #1c1c1c;
      --text: #f5f5f5;
      --muted: #a7a7a7;
      --border: #2d2d2d;
      --button: #f5f5f5;
      --button-fg: #121212;
      --button-hover: #dcdcdc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--muted);
      text-transform: uppercase;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
    }

    input:focus,
    select:focus,
    button:focus {
      outline: 2px solid rgba(245, 245, 245, 0.35);
      outline-offset: 2px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      background: var(--button);
      color: var(--button-fg);
      font-weight: 600;
      font-size: 13px;
    }

    button:hover {
      background: var(--button-hover);
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .status {
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .status.error {
      color: #ff8a80;
    }

    .footer {
      border-top: 1px solid var(--border);
      padding-top: 10px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div>
      <h1>Capture active tab as MDO</h1>
      <p>Capture the current page with a clipper-style mode selector, then save a packaged `.mdo` file.</p>
    </div>
    <label class="field" for="titleInput">
      <span class="label">Title</span>
      <input id="titleInput" type="text" autocomplete="off" spellcheck="false" placeholder="Use the page title">
    </label>
    <label class="field" for="captureMode">
      <span class="label">Capture mode</span>
      <select id="captureMode">
        <option value="selection">Selection first</option>
        <option value="article">Article</option>
        <option value="full">Full page</option>
      </select>
    </label>
    <p>Selection mode falls back to article capture when nothing is highlighted.</p>
    <button id="captureBtn" type="button">Save as MDO</button>
    <div id="status" class="status"></div>
    <div class="footer">
      Right-click pages for quick capture, or use <code>Alt+Shift+M</code> for the last-used mode.
    </div>
  </div>
  <script src="./dist/popup.js"></script>
</body>
</html>
