<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capture as MDO</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #121212;
      --panel: #1c1c1c;
      --text: #f5f5f5;
      --muted: #a7a7a7;
      --border: #2d2d2d;
      --button: #f5f5f5;
      --button-fg: #121212;
      --button-hover: #dcdcdc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .wrap {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      background: var(--button);
      color: var(--button-fg);
      font-weight: 600;
      font-size: 13px;
    }

    button:hover {
      background: var(--button-hover);
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .status {
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .status.error {
      color: #ff8a80;
    }

    .footer {
      border-top: 1px solid var(--border);
      padding-top: 10px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div>
      <h1>Capture active tab as MDO</h1>
      <p>Web pages are saved with packaged media. PDF tabs are saved with the PDF attached.</p>
    </div>
    <button id="captureBtn" type="button">Capture and Save</button>
    <div id="status" class="status"></div>
    <div class="footer">
      The resulting file opens in the VS Code MDO editor.
    </div>
  </div>
  <script src="./dist/popup.js"></script>
</body>
</html>
